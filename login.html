<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Projeto Arca</title>

    <link href="https://fonts.googleapis.com/css2?family=Concert+One&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>

<header>
    <div class="cabecalho">
        <div class="logo">
            <img src="imagens/logoprefeitura.png" alt="Logo Prefeitura da Serra">
            <img src="imagens/logoprojetoarca.png" alt="Logo Projeto Arca">
        </div>

        <div class="menu">
            <nav>
                <a href="index.html">Início</a>
                <a href="agendamentos.html">Agendamentos</a>
                <a href="ajuda.html">Ajuda</a>
                <a href="sobre.html">Sobre</a>
            </nav>
        </div>
    </div>
</header>

<main class="pagina-login">

    <section class="card-login">

        <h1>Login</h1>

        <p>Acesse sua conta no Projeto Arca</p>

        <form onsubmit="validarLogin(event)">

            <label for="usuario">Usuário</label>
            <input
                type="text"
                id="usuario"
                placeholder="Digite seu usuário"
            >

            <label for="senha">Senha</label>
            <input
                type="password"
                id="senha"
                placeholder="Digite sua senha"
            >

            <button type="submit">Entrar</button>

        </form>

        <div class="links-login">
            <a href="recuperar_senha.html">
                Esqueceu sua senha?
            </a>
        </div>

        <div class="links-login">
            <span>Não possui conta? </span>

            <a href="cadastro.html">
                Cadastre-se
            </a>
        </div>

        <span id="mensagemErro"></span>

    </section>

</main>

<script src="login.js"></script>

</body>
</html>
